name: Daily Finance Tech News Radar - Cloudflare AI

on:
  workflow_dispatch:
  schedule:
    # 22:09 Hong Kong time = 14:09 UTC.
    - cron: "9 14 * * *"

permissions:
  contents: write

concurrency:
  group: daily-news-radar-cloudflare-ai
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily brief with Cloudflare Workers AI
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_AI_MODEL: ${{ vars.CF_AI_MODEL || '@cf/meta/llama-3.1-8b-instruct' }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/generate_daily_news_cf_ai.py

      - name: Commit website data
        run: |
          git config user.name "tinydream-news-bot"
          git config user.email "tinydream-news-bot@users.noreply.github.com"
          git add data/index.json data/briefs/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TODAY="$(TZ=Asia/Hong_Kong date +%F)"
            git commit -m "Add daily news brief ${TODAY}"
            git push
          fi
