name: Daily Finance Tech News Radar

on:
  workflow_dispatch:
  schedule:
    # 08:00 Hong Kong time = 00:00 UTC.
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-news-radar
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily brief JSON and email body
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/generate_daily_news.py

      - name: Commit website data
        run: |
          git config user.name "tinydream-news-bot"
          git config user.email "tinydream-news-bot@users.noreply.github.com"
          git add data/index.json data/briefs/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TODAY="$(date -u +%F)"
            git commit -m "Add daily news brief ${TODAY}"
            git push
          fi
